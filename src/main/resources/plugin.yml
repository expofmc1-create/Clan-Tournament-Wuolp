name: ClanTournament
version: 1.0
main: com.bagadbilla.clantournament.ClanTournament
api-version: 1.20
commands:
  clan:
    description: Main command for the Clan Tournament.
    usage: /clan
    aliases: [c, cl] # Players can use /c or /cl as shortcuts
    permission: clantournament.use
permissions:
  clantournament.use:
    description: Allows everyone to use the clan commands.
    default: true
